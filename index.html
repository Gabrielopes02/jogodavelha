<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da velha</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="content">
         
      

      <div class="menu">
        <button type="button" class="options" id="buttonHome"><i class="fa-regular fa-house"></i></button>
        <button type="button" class="options"><i class="fa-solid fa-gamepad"></i></button>
        <button type="button" class="options"><i class="fa-solid fa-gears"></i></button>
      </div>
    
      <div class="home">
        <div class="title">
        <h2>Jogo da velha</h2>
        </div>
        <div class="home-content">
          <p id="frasesHome"></p>
        </div>
      </div>

      <div class="game">
        <h2>JOGO DA VELHA</h2>
        <h2 class="placar">x</h2>
        <div class="table">
          <div class="botoes">
            <div class="jogadas" id="111" onclick="jogadas(this)"></div>
            <div class="jogadas" id="212" onclick="jogadas(this)"></div>
            <div class="jogadas" id="313" onclick="jogadas(this)"></div>
            <div class="jogadas" id="421" onclick="jogadas(this)"></div>
            <div class="jogadas" id="522" onclick="jogadas(this)"></div>
            <div class="jogadas" id="623" onclick="jogadas(this)"></div>
            <div class="jogadas" id="731" onclick="jogadas(this)"></div>
            <div class="jogadas" id="832" onclick="jogadas(this)"></div>
            <div class="jogadas" id="933" onclick="jogadas(this)"></div>
          </div>
        </div>
        <div class="but">
          <button class="players" id="jogarSozinho">
            &#129302;jogar sozinho
          </button>
          <button class="players" id="2jogadores">&#128101;2 jogadores</button>
        </div>
      </div>
      <div class="config">tema dificuldade do bot reset de placar</div>
    </div>
    <dialog id="modal">
      <div id="resultado">
        <h2 id="stringGanhou"></h2>
        <button class="players" id="closeModal">
          <p>jogar novamente</p>
        </button>
      </div>
    </dialog>



    <script src="script.js"></script>
  </body>
</html>
